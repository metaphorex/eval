# promptfoo config for prompt sensitivity testing
# Run: npx promptfoo@latest eval --config promptfoo/promptfooconfig.yaml
# View: npx promptfoo@latest view

prompts:
  - file://prompts/v1.txt  # Control: architect persona, explicit encouragement
  - file://prompts/v2.txt  # Team framing, conversational tone
  - file://prompts/v3.txt  # Minimal: no persona, no explanation of why
  - file://prompts/v4.txt  # Few-shot: shows a worked example first
  - file://prompts/v5.txt  # Creativity nudge: "avoid the obvious"

providers:
  - id: openai:chat:deepseek/deepseek-chat-v3-0324
    label: deepseek-v3
    config:
      apiHost: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY
  - id: openai:chat:google/gemini-2.5-flash-lite
    label: gemini-flash-lite
    config:
      apiHost: https://openrouter.ai/api/v1
      apiKeyEnvar: OPENROUTER_API_KEY

tests:
  - vars:
      system_desc: >
        A distributed task queue for ML model training jobs. Components include:
        job submission, resource allocation, data loading, model checkpointing,
        gradient synchronization, failure recovery, result aggregation, scheduling,
        monitoring, and artifact storage.
    assert:
      - type: contains
        value: "|"
      - type: regex
        value: "\\d+\\."
      - type: llm-rubric
        value: >
          Do the component names all come from the same metaphorical source domain
          (e.g., all cooking, all military, all theater)? Score 1 if 8+ names share
          a domain, 0.5 if 5-7 share, 0 if fewer than 5 share.
      - type: llm-rubric
        value: >
          For each component, does the "Potential Mislead" identify a genuine,
          non-obvious risk of the metaphorical name — something that could actually
          confuse a new team member? Score 1 if 8+ misleads are substantive,
          0.5 if 5-7 are, 0 if fewer than 5 are.

  - vars:
      system_desc: >
        An automated content moderation pipeline for a social platform. Components
        include: content ingestion, classification, human review queue, appeal
        handling, policy enforcement, audit logging, reporter feedback, false
        positive tracking, escalation routing, and metrics dashboard.
    assert:
      - type: contains
        value: "|"
      - type: regex
        value: "\\d+\\."
      - type: llm-rubric
        value: >
          Do the component names all come from the same metaphorical source domain?
          Score 1 if 8+ names share a domain, 0.5 if 5-7 share, 0 if fewer than 5.
      - type: llm-rubric
        value: >
          For each component, does the "Potential Mislead" identify a genuine,
          non-obvious risk of the metaphorical name? Score 1 if 8+ misleads are
          substantive, 0.5 if 5-7 are, 0 if fewer than 5 are.
